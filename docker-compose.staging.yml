version: '3.8'

services:
  jenkins-weather-app:
    image: ${DOCKER_REGISTRY}/${DOCKER_USERNAME}/jenkins-weather-app:${BUILD_NUMBER}
    container_name: jenkins-weather-app-staging
    ports:
      - "8080:8080"
    environment:
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY}
      - SPRING_PROFILES_ACTIVE=staging
      - JAVA_OPTS=-Xmx1g -Xms512m
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/weather?city=Pune"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always
    networks:
      - jenkins-network-staging
    volumes:
      - app-logs-staging:/app/logs
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  app-logs-staging:

networks:
  jenkins-network-staging:
    driver: bridge
